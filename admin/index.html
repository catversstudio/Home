<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Admin Login | Catvers Studio</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries">
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Inter:wght@100..900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
        body {
            background: #050505;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 40px 36px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }
        .login-box .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-box .logo h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: #ddb7ff;
            letter-spacing: -0.5px;
        }
        .login-box .logo p {
            color: #988d9f;
            font-size: 14px;
            margin-top: 4px;
        }
        .login-box .logo .icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, #ddb7ff, #b76dff);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 28px;
            font-weight: 700;
            color: #050505;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #cfc2d6;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            color: #e5e2e1;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: rgba(221, 183, 255, 0.3);
            background: rgba(255, 255, 255, 0.06);
        }
        .form-group input::placeholder {
            color: #4d4354;
        }
        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            font-size: 13px;
        }
        .form-options label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #988d9f;
            cursor: pointer;
        }
        .form-options label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #ddb7ff;
            cursor: pointer;
        }
        .form-options a {
            color: #988d9f;
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .form-options a:hover {
            color: #ddb7ff;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ddb7ff, #b76dff);
            border: none;
            border-radius: 12px;
            color: #050505;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .login-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(221, 183, 255, 0.2);
        }
        .login-btn:active {
            transform: scale(0.98);
        }
        .error-msg {
            color: #f87171;
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
            min-height: 20px;
        }
        .footer-text {
            text-align: center;
            color: #4d4354;
            font-size: 12px;
            margin-top: 24px;
        }
        /* Background glow */
        .bg-glow {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
        }
        .bg-glow .glow1 {
            position: absolute;
            top: -20%;
            left: -20%;
            width: 60%;
            height: 60%;
            background: rgba(221, 183, 255, 0.05);
            border-radius: 50%;
            filter: blur(120px);
        }
        .bg-glow .glow2 {
            position: absolute;
            bottom: -20%;
            right: -20%;
            width: 60%;
            height: 60%;
            background: rgba(93, 230, 255, 0.05);
            border-radius: 50%;
            filter: blur(120px);
        }
        /* Locked state */
        .locked {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="bg-glow">
        <div class="glow1"></div>
        <div class="glow2"></div>
    </div>

    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <div class="icon">C</div>
                <h1>Catvers Studio</h1>
                <p>Admin Panel — Secure Access</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" value="admin" />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" />
                </div>
                <div class="form-options">
                    <label>
                        <input type="checkbox" id="rememberMe" /> Remember Me
                    </label>
                    <a href="#">Forgot Password?</a>
                </div>
                <button type="submit" class="login-btn">Login →</button>
                <div class="error-msg" id="errorMsg"></div>
            </form>

            <div class="footer-text">🔐 Protected area. Authorized access only.</div>
        </div>
    </div>

    <script>
        // ============================================
        // SECURE LOGIN CONFIG
        // ============================================
        const SECRET_USERNAME = "admin";
        const SECRET_PASSWORD = "catvers2026";
        const MAX_ATTEMPTS = 5;
        const LOCK_TIME = 300000; // 5 minutes

        let attempts = 0;
        let locked = false;
        let lockTimer = null;

        // ============================================
        // CHECK SESSION
        // ============================================
        if (sessionStorage.getItem('adminLoggedIn') === 'true') {
            const loginTime = parseInt(sessionStorage.getItem('adminLoginTime'));
            const elapsed = Date.now() - loginTime;
            if (elapsed < 1800000) { // 30 minutes
                window.location.href = 'dashboard.html';
            } else {
                sessionStorage.removeItem('adminLoggedIn');
                sessionStorage.removeItem('adminLoginTime');
            }
        }

        // ============================================
        // LOGIN FORM HANDLER
        // ============================================
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            if (locked) {
                document.getElementById('errorMsg').textContent = '⏳ Too many attempts. Try again in 5 minutes.';
                return;
            }

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            if (!username || !password) {
                document.getElementById('errorMsg').textContent = '⚠️ Please enter both username and password.';
                return;
            }

            if (username === SECRET_USERNAME && password === SECRET_PASSWORD) {
                // ✅ Login Success
                sessionStorage.setItem('adminLoggedIn', 'true');
                sessionStorage.setItem('adminLoginTime', Date.now());

                if (rememberMe) {
                    localStorage.setItem('adminRememberMe', 'true');
                    localStorage.setItem('adminUsername', username);
                } else {
                    localStorage.removeItem('adminRememberMe');
                    localStorage.removeItem('adminUsername');
                }

                // Redirect to dashboard
                window.location.href = 'dashboard.html';
            } else {
                // ❌ Login Failed
                attempts++;
                const remaining = MAX_ATTEMPTS - attempts;
                document.getElementById('errorMsg').textContent = `❌ Invalid credentials. ${remaining} attempts remaining.`;
                document.getElementById('password').value = '';
                document.getElementById('password').focus();

                if (attempts >= MAX_ATTEMPTS) {
                    locked = true;
                    document.getElementById('errorMsg').textContent = '⏳ Too many failed attempts. Locked for 5 minutes.';
                    document.getElementById('loginForm').classList.add('locked');

                    lockTimer = setTimeout(() => {
                        locked = false;
                        attempts = 0;
                        document.getElementById('loginForm').classList.remove('locked');
                        document.getElementById('errorMsg').textContent = '';
                    }, LOCK_TIME);
                }
            }
        });

        // ============================================
        // REMEMBER ME
        // ============================================
        if (localStorage.getItem('adminRememberMe') === 'true') {
            document.getElementById('username').value = localStorage.getItem('adminUsername') || 'admin';
            document.getElementById('rememberMe').checked = true;
        }

        // ============================================
        // ENTER KEY SUPPORT
        // ============================================
        document.getElementById('password').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });

        document.getElementById('username').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('password').focus();
            }
        });
    </script>
</body>
</html>
